<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun · Sistem Dagang</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black:  #0d0d0d;
            --white:  #fffdf5;
            --yellow: #ffe94e;
            --green:  #00e06a;
            --blue:   #4f8cff;
            --red:    #ff4747;
            --border: 2.5px solid var(--black);
            --shadow: 5px 5px 0 var(--black);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--white);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
            background-image: radial-gradient(circle, #c8c4b0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .box {
            background: white;
            border: var(--border);
            box-shadow: 8px 8px 0 var(--black);
            padding: 40px;
            width: 100%; max-width: 440px;
        }

        .box-tag {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
            background: var(--green); border: var(--border);
            padding: 4px 12px; box-shadow: 2px 2px 0 var(--black); margin-bottom: 14px;
        }

        h1 { font-size: 30px; font-weight: 700; letter-spacing: -1px; margin-bottom: 4px; }
        h1 span {
            background: var(--green); padding: 0 6px;
            border: var(--border); display: inline-block; box-shadow: 3px 3px 0 var(--black);
        }
        .subtitle { color: #666; font-size: 14px; font-weight: 500; margin-bottom: 28px; }

        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        label {
            font-family: 'Space Mono', monospace;
            font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
        }
        input {
            width: 100%; padding: 13px 16px;
            font-size: 15px; font-family: 'Space Grotesk', sans-serif; font-weight: 500;
            color: var(--black); background: #fffdf5;
            border: var(--border); border-radius: 0; outline: none;
            box-shadow: 3px 3px 0 var(--black);
            transition: box-shadow .15s, transform .15s;
        }
        input:focus { box-shadow: 5px 5px 0 var(--black); transform: translate(-1px,-1px); background: #fffbe6; }
        input::placeholder { color: #bbb; }

        .hint { font-size: 12px; color: #999; font-weight: 500; margin-top: 2px; }

        .btn-register {
            width: 100%; padding: 15px;
            font-size: 15px; font-weight: 700; font-family: 'Space Grotesk', sans-serif;
            letter-spacing: .5px; text-transform: uppercase;
            background: var(--green); color: var(--black);
            border: var(--border); border-radius: 0; cursor: pointer;
            box-shadow: var(--shadow); transition: transform .12s, box-shadow .12s;
            margin-top: 8px;
        }
        .btn-register:hover  { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 var(--black); }
        .btn-register:active { transform: translate(3px,3px); box-shadow: 2px 2px 0 var(--black); }

        .error-box {
            background: var(--red); color: white;
            border: var(--border); padding: 12px 16px;
            font-weight: 700; font-size: 14px;
            box-shadow: 3px 3px 0 var(--black); margin-bottom: 20px;
        }

        .divider { border: none; border-top: 2.5px dashed var(--black); margin: 24px 0; }

        .login-link {
            text-align: center; font-size: 14px; font-weight: 600; color: #555;
        }
        .login-link a {
            color: var(--black); font-weight: 700;
            text-decoration: none;
            border-bottom: 2.5px solid var(--black);
            padding-bottom: 1px;
        }
        .login-link a:hover { background: var(--yellow); }
    </style>
</head>
<body>
<div class="box">
    <div class="box-tag">buat akun kamu sekarang</div>
    <h1>BUAT <span>AKUN</span></h1>
    <p class="subtitle">Daftar untuk mulai mencatat produk & penjualan kamu sendiri</p>

    {% if error %}
    <div class="error-box">⚠ {{ error }}</div>
    {% endif %}

    <form action="/register" method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username"
                   placeholder="Contoh: DaffaStore" maxlength="50" required autocomplete="username">
            <span class="hint">Tidak boleh ada spasi, gunakan huruf/angka/underscore</span>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password"
                   placeholder="Minimal 4 karakter" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="confirm_password">Konfirmasi Password</label>
            <input type="password" id="confirm_password" name="confirm_password"
                   placeholder="Ulangi Password" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn-register">＋ BUAT AKUN SEKARANG</button>
    </form>

    <hr class="divider">

    <p class="login-link">Sudah punya akun? <a href="/login">Masuk di sini →</a></p>
</div>
</body>
</html>
